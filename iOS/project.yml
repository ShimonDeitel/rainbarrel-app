name: Rainbarrel
options:
  bundleIdPrefix: com.shimondeitel.rainbarrel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rainbarrel:
    type: application
    platform: iOS
    sources:
      - path: Rainbarrel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rainbarrel
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rainbarrel/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RainbarrelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RainbarrelTests
      - path: Rainbarrel.storekit
    dependencies:
      - target: Rainbarrel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rainbarrel.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RainbarrelUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RainbarrelUITests
    dependencies:
      - target: Rainbarrel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rainbarrel.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rainbarrel:
    build:
      targets:
        Rainbarrel: all
        RainbarrelTests: [test]
        RainbarrelUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rainbarrel.storekit
    test:
      config: Debug
      storeKitConfiguration: Rainbarrel.storekit
      targets:
        - RainbarrelTests
        - RainbarrelUITests
    archive:
      config: Release
